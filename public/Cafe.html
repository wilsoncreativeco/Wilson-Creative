
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cafe | Artisanal Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F0; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="text-stone-900 antialiased">
    <nav class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center mix-blend-difference text-white">
        <div class="flex items-center gap-2">
            <i data-lucide="coffee" class="w-6 h-6"></i>
            <span class="serif text-2xl tracking-tighter italic">Your Cafe</span>
        </div>
    </nav>
    <section class="h-screen flex items-center justify-center relative overflow-hidden px-6 text-center text-white">
        <div class="absolute inset-0">
            <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?auto=format&fit=crop&q=80&w=1920" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/30"></div>
        </div>
        <div class="relative z-10">
            <h1 class="text-[12vw] serif italic leading-[0.85] tracking-tighter mb-8">Silent Mornings,<br>Loud Flavors.</h1>
        </div>
    </section>
    <script>lucide.createIcons();</script>
</body>
</html>
